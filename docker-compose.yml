services:
  openclaw:
    image: coollabsio/openclaw:latest
    networks:
      - coolify 
    environment:
      PORT: "18789"
      OPENCLAW_GATEWAY_PORT: "18788" 
      GEMINI_API_KEY: "${GEMINI_API_KEY}"
      OPENCLAW_GATEWAY_TOKEN: "${OPENCLAW_GATEWAY_TOKEN}"
      BROWSER_CDP_URL: "http://browser:9223"
      BROWSER_DEFAULT_PROFILE: "openclaw"
      BROWSER_EVALUATE_ENABLED: "true"
    volumes:
      - /data/openclaw/config:/data/.openclaw
      - /data/openclaw/workspace:/data/workspace
    depends_on:
      - browser
    restart: unless-stopped
    labels:
      - traefik.enable=true
      - "traefik.http.routers.openclaw.rule=Host(`aladdin.scaletotop.com`)"
      - traefik.http.routers.openclaw.entrypoints=https
      - traefik.http.routers.openclaw.tls=true
      - traefik.http.routers.openclaw.tls.certresolver=letsencrypt
      - traefik.http.services.openclaw.loadbalancer.server.port=18789
      - traefik.docker.network=coolify

  browser:
    image: coollabsio/openclaw-browser:latest
    environment:
      CHROME_CLI: "--remote-debugging-port=9222"
    volumes:
      - browser-data:/config
    shm_size: 2g
    restart: unless-stopped

volumes:
  browser-data:

networks:
  coolify:
    external: true
